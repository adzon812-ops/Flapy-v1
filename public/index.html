<!-- index.html (или вставка в index.tsx) -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flapy - Добро пожаловать домой</title>
    <!-- Шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Сброс стилей */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; overflow: hidden; background: #1a0d17; }

        /* 2. Сплэш-скрин контейнер */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #4B1E55 0%, #E6644A 60%, #F9A65A 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        /* Скрытие сплэш-скрина */
        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 3. Анимация звезд */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        .star:nth-child(1) { top: 10%; left: 15%; width: 3px; height: 3px; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; left: 80%; width: 2px; height: 2px; animation-delay: 1s; }
        .star:nth-child(3) { top: 5%; left: 50%; width: 4px; height: 4px; animation-delay: 0.5s; }
        .star:nth-child(4) { top: 40%; left: 20%; width: 2px; height: 2px; animation-delay: 2s; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 4. Анимация облаков */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            filter: blur(5px);
        }
        .cloud-1 {
            width: 150px; height: 40px; top: 20%; left: -200px;
            animation: floatCloud 25s linear infinite;
        }
        .cloud-2 {
            width: 200px; height: 60px; top: 40%; left: -300px;
            animation: floatCloud 35s linear infinite 5s;
        }
        @keyframes floatCloud {
            from { left: -300px; }
            to { left: 110%; }
        }

        /* 5. SVG Иконка дома */
        .house-icon {
            width: 160px;
            height: 160px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            animation: houseFloat 4s ease-in-out infinite;
        }
        
        /* Мерцание окна */
        .window-glow {
            fill: #FFD166;
            animation: glow 3s infinite alternate;
        }
        @keyframes glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px #FFD166); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px #FFD166); }
        }

        @keyframes houseFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 6. Тексты */
        .title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.5s forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #F9D89C;
            letter-spacing: 1px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.8s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 7. Прогресс бар */
        .loader-bar {
            width: 120px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loader-progress {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            background: #fff;
            width: 0%;
            animation: loadProgress 2.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* 8. Мобильная адаптация */
        @media (max-width: 480px) {
            .title { font-size: 2.8rem; }
            .subtitle { font-size: 1rem; }
            .house-icon { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <!-- СПЛЭШ СКРИН -->
    <div id="splash-screen">
        <!-- Звёзды -->
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>

        <!-- Облака -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>

        <!-- SVG Иконка дома -->
        <svg class="house-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Крыша -->
            <path d="M10 45 L50 15 L90 45" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Стены -->
            <rect x="25" y="45" width="50" height="40" fill="#FFFFFF" fill-opacity="0.15" stroke="#FFFFFF" stroke-width="2" rx="2"/>
            <!-- Окно -->
            <rect x="38" y="55" width="24" height="15" class="window-glow" rx="1"/>
            <!-- Дверь -->
            <path d="M45 85 V65 A5 5 0 0 1 55 65 V85" stroke="#FFFFFF" stroke-width="2"/>
        </svg>

        <!-- Текст -->
        <div class="title">Flapy</div>
        <div class="subtitle">Добро пожаловать домой</div>

        <!-- Лоадер -->
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <!-- Основной контент твоего приложения (скрыт за сплэшем) -->
    <div id="app-content">
        <!-- Твой основной код Hono/React -->
    </div>

    <script>
        // Логика скрытия сплэш-скрина
        window.addEventListener('load', () => {
            // Ждем 2.5 секунды, чтобы показать анимацию
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.classList.add('hidden');
                
                // Удаляем из DOM полностью после анимации исчезновения
                setTimeout(() => {
                    splash.remove();
                }, 800);
            }, 2500);
        });
    </script>
</body>
</html>
